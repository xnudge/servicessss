<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- iOS PWA meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Servis" />

  <title>AYAKKABI DÜNYASI ESAS HOLDİNG-ZİNCİRLİKUYU SERVİS ROTASI</title>

  <!-- PWA / ikonlar -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6a00ff" />
  <link rel="icon" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />

  <style>
    :root{
      --bg1: #0b1b3a;
      --bg2: #2b2f77;

      --text: #ffffff;
      --subtext: rgba(255,255,255,.92);

      --glass: rgba(255,255,255,.14);
      --glass2: rgba(255,255,255,.10);
      --border: rgba(255,255,255,.22);
      --shadow: 0 18px 50px rgba(0,0,0,.22);
    }

    *{ box-sizing: border-box; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 500px at 10% 10%, rgba(255,255,255,.18), transparent 60%),
        linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg1));
      min-height: 100vh;
    }

    .wrap{
      max-width: 1100px;
      margin: 0 auto;
      padding: 22px 14px 30px;
    }

    .topCard{
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      padding: 18px 16px 16px;
      overflow: hidden;
      animation: fadeIn .55s ease both;
    }

    .brandRow{
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
    }

    .logo{
      width: 150px;
      height: 150px;
      border-radius: 18px;
      object-fit: contain;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.28);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      padding: 10px;
    }

    h1{
      margin: 10px 0 6px;
      text-align:center;
      font-size: clamp(20px, 3vw, 34px);
      line-height: 1.15;
      text-shadow: 0 10px 30px rgba(0,0,0,.25);
      letter-spacing: .2px;
    }

    .sub{
      margin: 0;
      text-align:center;
      font-weight: 600;
      color: var(--subtext);
      opacity: 1;
    }

    /* === Buton satırı: 3 eşit sütun === */
    .btnRow{
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .btn{
      border: 0;
      cursor: pointer;
      text-decoration: none;
      padding: 14px 10px;
      border-radius: 14px;
      font-weight: 800;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 4px;
      transition: transform .12s ease, opacity .12s ease;
      user-select: none;
      background: transparent;
      min-height: 70px;
    }
    .btn:hover{ transform: translateY(-2px); opacity: .96; }

    .btnPrimary{
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.24);
      color: #fff;
      backdrop-filter: blur(10px);
      box-shadow: 0 14px 35px rgba(0,0,0,.22);
      position: relative;
    }

    .btnPrimary::after{
      content:"";
      position:absolute;
      inset:-10px;
      border-radius: 18px;
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,.22), transparent 55%);
      opacity:0;
      transition: opacity .15s ease;
      pointer-events:none;
    }
    .btnPrimary:hover::after{ opacity:.9; }

    .btnGhost{
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.22);
      color: #fff;
      backdrop-filter: blur(10px);
    }

    /* === İnfo kartları: tam genişlik, alt alta === */
    .infoStack{
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 14px;
    }

    .card{
      background: var(--glass2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      backdrop-filter: blur(10px);
      text-align: center;
    }

    /* Başlangıç/Bitiş: yan yana kutucuklar, ortalı */
    .kpis{
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .kpi{
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 16px;
      padding: 12px 10px;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .kpi .label{
      font-size: 12px;
      opacity: .88;
      margin-bottom: 6px;
      font-weight: 700;
    }
    .kpi .value{
      font-size: 14px;
      font-weight: 900;
      white-space: normal;
      word-break: break-word;
    }

    .note{
      font-size: 13px;
      opacity: .92;
      line-height: 1.5;
    }

    .tag{
      display:block;
      width: fit-content;
      margin: 18px auto 16px auto;
      padding: 12px 26px;
      border-radius: 16px;
      background: linear-gradient(135deg, #00e0ff, #6a00ff);
      color: #fff;
      font-weight: 900;
      font-size: 16px;
      letter-spacing: .5px;
      text-align:center;
      box-shadow: 0 10px 30px rgba(0,0,0,.3);
    }

    .footer{
      margin-top: 40px;
      padding: 20px 10px;
      text-align: center;
      font-size: 13px;
      opacity: .85;
      line-height: 1.6;
    }

    .footerContent{
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .itLetter{
      color: #00e0ff;
      font-weight: 900;
      text-shadow: 0 0 8px rgba(0,224,255,.8);
    }

    .btnMain{ line-height: 1.1; font-size: 14px; }

    .btnSub{
      font-size: 11px;
      font-style: italic;
      font-weight: 500;
      opacity: .8;
    }

    @keyframes fadeIn{
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* === Toast === */
    #toast{
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: linear-gradient(135deg, #ff6b00, #ff0080, #ff6b00);
      background-size: 200% auto;
      animation: toastShimmer 2s linear infinite;
      color: #fff;
      font-weight: 900;
      font-size: 18px;
      padding: 20px 36px;
      border-radius: 24px;
      box-shadow: 0 0 40px rgba(255,80,0,.6), 0 10px 40px rgba(0,0,0,.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease, transform .3s ease;
      white-space: nowrap;
      z-index: 999;
      letter-spacing: .4px;
      text-align: center;
    }
    #toast.show{
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    @keyframes toastShimmer{
      0%  { background-position: 0% center; }
      100%{ background-position: 200% center; }
    }

    /* === Günlük Kart === */
    .dailyCard{
      background: linear-gradient(135deg, rgba(106,0,255,.25), rgba(0,224,255,.15));
      border: 1px solid rgba(0,224,255,.35);
      border-radius: 20px;
      padding: 14px 18px;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 12px;
      box-shadow: 0 4px 20px rgba(0,224,255,.1);
      flex-wrap: wrap;
    }
    .dailyLeft{
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 80px;
    }
    .dailyDate{
      font-size: 11px;
      font-weight: 700;
      color: #00e0ff;
      text-shadow: 0 0 8px rgba(0,224,255,.5);
    }
    .dailyTime{
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #ffffff, #00e0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .dailyWeather{
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 12px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 14px;
      min-width: 70px;
    }
    .weatherTemp{
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 900;
      color: #fff;
    }
    .weatherDesc{
      font-size: 10px;
      font-weight: 700;
      color: #00e0ff;
      text-align: center;
      line-height: 1.3;
    }
    .dailyMsg{
      font-size: clamp(11px, 2.5vw, 13px);
      font-weight: 700;
      text-align: right;
      max-width: 40%;
      line-height: 1.5;
      color: #fff;
      opacity: .95;
    }

    @media (max-width: 400px){
      .dailyMsg{ max-width: 100%; text-align: center; }
      .dailyCard{ justify-content: center; }
    }

    /* ===== Light (Gündüz) Modu ===== */
    body.light{
      --bg1: #f5f7ff;
      --bg2: #dbe4ff;

      --text: #0b1b3a;
      --subtext: rgba(11,27,58,.78);

      --glass: rgba(255,255,255,.72);
      --glass2: rgba(255,255,255,.55);
      --border: rgba(11,27,58,.18);
      --shadow: 0 18px 50px rgba(0,0,0,.12);
    }

    /* Light modda buton yazıları net olsun */
    body.light .btnPrimary,
    body.light .btnGhost{
      color: var(--text);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topCard">
      <div class="brandRow">
        <img class="logo" src="images.png" alt="Logo Sol" />
        <img class="logo" src="Screenshot_1.png" alt="Logo Sağ" />
      </div>

      <h1>AYAKKABI DÜNYASI SERVİS GÜZERGAHI</h1>
      <p class="sub">Tek Rota • Mobil Uyumlu</p>


      <div class="btnRow">
        <a id="navBtn" class="btn btnPrimary" href="javascript:void(0)">
          <span class="btnMain">🚗 Navigasyonu Başlat</span>
          <span class="btnSub">Google Maps</span>
        </a>

        <button type="button" class="btn btnGhost" style="cursor:default;">Ş: Ferdi Bey</button>

        <button id="themeBtn" class="btn btnGhost" type="button">🌙 Gece Modu</button>
      </div>

      <div class="dailyCard">
        <div class="dailyLeft">
          <div class="dailyDate" id="dailyDate">-</div>
          <div class="dailyTime" id="dailyClock">--:--</div>
        </div>
        <div class="dailyWeather" id="dailyWeather">
          <div class="weatherTemp" id="weatherTemp">…</div>
          <div class="weatherDesc" id="weatherDesc">yükleniyor</div>
        </div>
        <div class="dailyMsg" id="dailyMsg">-</div>
      </div>

      <div class="infoStack">
        <div class="card">
          <div class="kpis">
            <div class="kpi">
              <div class="label">Başlangıç</div>
              <div id="originText" class="value">-</div>
            </div>
            <div class="kpi">
              <div class="label">Bitiş</div>
              <div id="destText" class="value">-</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="note">
            <b>Bilgilendirme</b><br/>
            Versiyon : 1.0 (başka güncelleme gelmez 🙂)<br/>
            Bağış Yapmak İsterseniz Sadece Dua 🙂
          </div>
        </div>
      </div>

  <div id="toast">🚗 Tek Tıkla Doğru Yol</div>
    </div>

    <footer class="footer">
      <div class="footerContent">
        <div>© 2026 Muhammet</div>
        <div>
          Designed by Muhammet
        </div>
      </div>
    </footer>
  </div>

  <script>
    // === ROTA KOORDİNATLARI ===
    const ORIGIN = { lat: 41.0894901, lng: 29.0963132 };
    const DEST   = { lat: 41.0691304, lng: 29.0152139 };

    const navBtn = document.getElementById("navBtn");
    const toast  = document.getElementById("toast");

    // === Toast ===
    function showToast(){
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3000);
    }

    navBtn.addEventListener("click", function(e){
      e.preventDefault();
      showToast();

      setTimeout(() => {
        const lat1 = ORIGIN.lat, lng1 = ORIGIN.lng;
        const lat2 = DEST.lat,   lng2 = DEST.lng;

        // iOS: Google Maps uygulaması
        const iosUrl     = `comgooglemaps://?saddr=${lat1},${lng1}&daddr=${lat2},${lng2}&directionsmode=driving`;
        // Android: Google Maps uygulaması
        const androidUrl = `google.navigation:q=${lat2},${lng2}`;
        // Fallback: web
        const webUrl     = `https://www.google.com/maps/dir/?api=1&origin=${lat1},${lng1}&destination=${lat2},${lng2}&travelmode=driving`;

        const isIOS     = /iPad|iPhone|iPod/.test(navigator.userAgent);
        const isAndroid = /Android/.test(navigator.userAgent);

        if(isIOS){
          window.location.href = iosUrl;
          setTimeout(() => { window.location.href = webUrl; }, 1000);
        } else if(isAndroid){
          window.location.href = androidUrl;
          setTimeout(() => { window.location.href = webUrl; }, 1000);
        } else {
          window.open(webUrl, "_blank");
        }
      }, 1500);
    });

    document.getElementById("originText").textContent = "İş";
    document.getElementById("destText").textContent = "Zincirlikuyu Metrobüs";

    // === Günlük Mesajlar ===
    const gunMesajlari = {
      0: "😱 Yarın İş Var...",
      1: "🥱 Pazartesi Sendromu Tespit Edildi… Çözüm: Bi kahve ☕",
      2: "🛣️ Salı Sallanır ama Rota Sabit 💪",
      3: "⏳ Hafta bitimi loading… %50",
      4: "😤 Bugün Dayan, Yarın Rahat 🛋️",
      5: "🔋 Bugün Performans Enerji Tasarrufunda 😎",
      6: "🌟 Gününüz Siz Kadar Güzel Geçsin ✨"
    };

    const gunIsimleri = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
    const ayIsimleri  = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

    function updateClock(){
      const now  = new Date();
      const gun  = now.getDay();
      const saat = String(now.getHours()).padStart(2,"0");
      const dak  = String(now.getMinutes()).padStart(2,"0");

      document.getElementById("dailyClock").textContent = `${saat}:${dak}`;
      document.getElementById("dailyDate").textContent  =
        `${gunIsimleri[gun]}, ${now.getDate()} ${ayIsimleri[now.getMonth()]} ${now.getFullYear()}`;
      document.getElementById("dailyMsg").textContent   = "";
    }

    updateClock();
    setInterval(updateClock, 1000);

    // === Hava Durumu (Open-Meteo, API key gerekmez, CORS yok) ===
    // Koordinatlar: Kavacık, İstanbul
    function fetchWeather(){
      const url = "https://api.open-meteo.com/v1/forecast?latitude=41.089&longitude=29.096&current=temperature_2m,weathercode&timezone=Europe/Istanbul";

      fetch(url)
        .then(r => r.json())
        .then(data => {
          const temp = Math.round(data.current.temperature_2m);
          const code = data.current.weathercode;
          const { icon, desc } = getWeather(code);
          document.getElementById("weatherTemp").textContent = `${icon} ${temp}°`;
          document.getElementById("weatherDesc").textContent = desc;
        })
        .catch(() => {
          document.getElementById("weatherTemp").textContent = "🌡️";
          document.getElementById("weatherDesc").textContent = "alınamadı";
        });
    }

    function getWeather(code){
      if(code === 0)                        return { icon:"☀️",  desc:"açık" };
      if(code === 1)                        return { icon:"🌤️", desc:"az bulutlu" };
      if(code === 2)                        return { icon:"⛅",  desc:"parçalı bulutlu" };
      if(code === 3)                        return { icon:"☁️",  desc:"bulutlu" };
      if([45,48].includes(code))            return { icon:"🌫️", desc:"sisli" };
      if([51,53,55].includes(code))         return { icon:"🌦️", desc:"çiseleme" };
      if([56,57].includes(code))            return { icon:"🌧️", desc:"dondurucu çiseleme" };
      if([61,63].includes(code))            return { icon:"🌧️", desc:"yağmurlu" };
      if(code === 65)                       return { icon:"🌧️", desc:"yoğun yağmur" };
      if([66,67].includes(code))            return { icon:"🌧️", desc:"dondurucu yağmur" };
      if([71,73].includes(code))            return { icon:"🌨️", desc:"karlı" };
      if(code === 75)                       return { icon:"❄️",  desc:"yoğun kar" };
      if(code === 77)                       return { icon:"🌨️", desc:"kar tanesi" };
      if([80,81].includes(code))            return { icon:"🌦️", desc:"sağanak" };
      if(code === 82)                       return { icon:"🌧️", desc:"şiddetli sağanak" };
      if([85,86].includes(code))            return { icon:"🌨️", desc:"kar sağanağı" };
      if([95,96,99].includes(code))         return { icon:"⛈️", desc:"fırtına" };
      return { icon:"🌡️", desc:"bilinmiyor" };
    }

    fetchWeather();

    // === Tema (Gece/Gündüz) ===
    const themeBtn = document.getElementById("themeBtn");

    function applyTheme(mode){
      const isLight = mode === "light";
      document.body.classList.toggle("light", isLight);
      localStorage.setItem("theme", mode);
      if(themeBtn){
        themeBtn.textContent = isLight ? "🌞 Gündüz Modu" : "🌙 Gece Modu";
      }
    }

    const savedTheme = localStorage.getItem("theme");
    if(savedTheme){
      applyTheme(savedTheme);
    }else{
      const prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
      applyTheme(prefersLight ? "light" : "dark");
    }

    themeBtn.addEventListener("click", () => {
      const isLightNow = document.body.classList.contains("light");
      applyTheme(isLightNow ? "dark" : "light");
    });

    // Service Worker register (PWA)
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }

    
  </script>
</body>
</html>
